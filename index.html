<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pac-Man Progressive</title>
  <style>
    body {
      background: black;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      font-family: Arial, sans-serif;
    }
    canvas {
      background: #000;
      border: 3px solid yellow;
    }
    #ui {
      margin-bottom: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>

<div id="ui">Score: 0 | Level: 1</div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");

let gridSize = 25;
let level = 1;
let score = 0;
let gameOver = false;

let pacman;
let maze;
let dots;
let enemies = [];
let exitPoint;

function resizeCanvas(size) {
  canvas.width = size;
  canvas.height = size;
}

function generateMaze(size, density) {
  let newMaze = [];

  for (let y = 0; y < size; y++) {
    let row = [];
    for (let x = 0; x < size; x++) {
      if (y === 0 || x === 0 || y === size - 1 || x === size - 1) {
        row.push(1);
      } else {
        row.push(Math.random() < density ? 1 : 0);
      }
    }
    newMaze.push(row);
  }

  newMaze[1][1] = 0;
  return newMaze;
}

function randomEmptyCell() {
  let x, y;
  do {
    x = Math.floor(Math.random() * maze.length);
    y = Math.floor(Math.random() * maze.length);
  } while (maze[y][x] === 1);
  return { x, y };
}

function initLevel() {
  let size = 10 + level * 4;
  resizeCanvas(size * gridSize);

  maze = generateMaze(size, 0.2 + level * 0.05);

  pacman = { x: 1, y: 1, dx: 1, dy: 0 };

  // Exit point (ending spot)
  exitPoint = randomEmptyCell();

  // Make sure exit isn't blocked near wall start
  exitPoint.x = size - 2;
  exitPoint.y = size - 2;
  maze[exitPoint.y][exitPoint.x] = 0;

  // Dots
  dots = [];
  for (let y = 0; y < maze.length; y++) {
    for (let x = 0; x < maze[y].length; x++) {
      if (maze[y][x] === 0) {
        dots.push({ x, y });
      }
    }
  }

  // Enemies
  enemies = [];
  for (let i = 0; i < level; i++) {
    let pos = randomEmptyCell();
    enemies.push({ x: pos.x, y: pos.y, dx: 1, dy: 0 });
  }
}

function drawPacman() {
  ctx.beginPath();
  ctx.arc(
    pacman.x * gridSize + gridSize / 2,
    pacman.y * gridSize + gridSize / 2,
    gridSize / 2,
    0.25 * Math.PI,
    1.75 * Math.PI
  );
  ctx.lineTo(
    pacman.x * gridSize + gridSize / 2,
    pacman.y * gridSize + gridSize / 2
  );
  ctx.fillStyle = "yellow";
  ctx.fill();
}

function drawDots() {
  ctx.fillStyle = "white";
  dots.forEach(dot => {
    ctx.beginPath();
    ctx.arc(
      dot.x * gridSize + gridSize / 2,
      dot.y * gridSize + gridSize / 2,
      3,
      0,
      Math.PI * 2
    );
    ctx.fill();
  });
}

function drawMaze() {
  ctx.fillStyle = "blue";
  for (let y = 0; y < maze.length; y++) {
    for (let x = 0; x < maze[y].length; x++) {
      if (maze[y][x] === 1) {
        ctx.fillRect(x * gridSize, y * gridSize, gridSize, gridSize);
      }
    }
  }
}

function drawExit() {
  ctx.fillStyle = "lime";
  ctx.fillRect(
    exitPoint.x * gridSize,
    exitPoint.y * gridSize,
    gridSize,
    gridSize
  );
}

function drawEnemies() {
  ctx.fillStyle = "red";
  enemies.forEach(e => {
    ctx.beginPath();
    ctx.arc(
      e.x * gridSize + gridSize / 2,
      e.y * gridSize + gridSize / 2,
      gridSize / 2,
      0,
      Math.PI * 2
    );
    ctx.fill();
  });
}

function moveEnemies() {
  enemies.forEach(e => {
    let dirs = [
      { dx: 1, dy: 0 },
      { dx: -1, dy: 0 },
      { dx: 0, dy: 1 },
      { dx: 0, dy: -1 }
    ];

    let move = dirs[Math.floor(Math.random() * dirs.length)];
    let nx = e.x + move.dx;
    let ny = e.y + move.dy;

    if (maze[ny] && maze[ny][nx] === 0) {
      e.x = nx;
      e.y = ny;
    }
  });
}

function update() {
  if (gameOver) return;

  let nextX = pacman.x + pacman.dx;
  let nextY = pacman.y + pacman.dy;

  if (maze[nextY] && maze[nextY][nextX] === 0) {
    pacman.x = nextX;
    pacman.y = nextY;
  }

  // score from dots (optional)
  dots = dots.filter(dot => {
    if (dot.x === pacman.x && dot.y === pacman.y) {
      score += 10;
      return false;
    }
    return true;
  });

  // enemy collision
  enemies.forEach(e => {
    if (e.x === pacman.x && e.y === pacman.y) {
      gameOver = true;
    }
  });

  // reach exit = next level
  if (pacman.x === exitPoint.x && pacman.y === exitPoint.y) {
    level++;
    initLevel();
  }

  if (level > 5) {
    gameOver = true;
  }

  moveEnemies();

  ui.textContent = `Score: ${score} | Level: ${level}`;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawMaze();
  drawExit();
  drawDots();
  drawEnemies();
  drawPacman();

  if (gameOver) {
    ctx.fillStyle = "white";
    ctx.font = "40px Arial";
    ctx.fillText(
      "GAME OVER / YOU WIN!",
      canvas.width / 2 - 180,
      canvas.height / 2
    );
  }
}

function gameLoop() {
  update();
  draw();
}

setInterval(gameLoop, 120);

document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp") {
    pacman.dx = 0; pacman.dy = -1;
  } else if (e.key === "ArrowDown") {
    pacman.dx = 0; pacman.dy = 1;
  } else if (e.key === "ArrowLeft") {
    pacman.dx = -1; pacman.dy = 0;
  } else if (e.key === "ArrowRight") {
    pacman.dx = 1; pacman.dy = 0;
  }
});

initLevel();
</script>

</body>
</html>
