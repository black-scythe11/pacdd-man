<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pac-Man Progressive</title>
  <style>
    body {
      background: black;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      font-family: Arial, sans-serif;
    }
    canvas {
      background: #000;
      border: 3px solid yellow;
    }
    #ui {
      margin-bottom: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
<div id="ui">Score: 0 | Level: 1</div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");

let gridSize = 25;
let level = 1;
let score = 0;
let gameOver = false;

let pacman;
let maze;
let dots;

function resizeCanvas(size) {
  canvas.width = size;
  canvas.height = size;
}

function generateMaze(size, density) {
  let rows = size;
  let cols = size;
  let newMaze = [];

  for (let y = 0; y < rows; y++) {
    let row = [];
    for (let x = 0; x < cols; x++) {
      if (y === 0 || x === 0 || y === rows - 1 || x === cols - 1) {
        row.push(1);
      } else {
        row.push(Math.random() < density ? 1 : 0);
      }
    }
    newMaze.push(row);
  }

  newMaze[1][1] = 0;
  return newMaze;
}

function initLevel() {
  let size = 10 + level * 4; // bigger map each level
  resizeCanvas(size * gridSize);

  maze = generateMaze(size, 0.2 + level * 0.05); // more walls each level

  pacman = { x: 1, y: 1, dx: 1, dy: 0 };

  dots = [];
  for (let y = 0; y < maze.length; y++) {
    for (let x = 0; x < maze[y].length; x++) {
      if (maze[y][x] === 0) {
        dots.push({ x, y });
      }
    }
  }
}

function drawPacman() {
  ctx.beginPath();
  ctx.arc(
    pacman.x * gridSize + gridSize / 2,
    pacman.y * gridSize + gridSize / 2,
    gridSize / 2,
    0.25 * Math.PI,
    1.75 * Math.PI
  );
  ctx.lineTo(pacman.x * gridSize + gridSize / 2, pacman.y * gridSize + gridSize / 2);
  ctx.fillStyle = "yellow";
  ctx.fill();
}

function drawDots() {
  ctx.fillStyle = "white";
  dots.forEach(dot => {
    ctx.beginPath();
    ctx.arc(
      dot.x * gridSize + gridSize / 2,
      dot.y * gridSize + gridSize / 2,
      3,
      0,
      Math.PI * 2
    );
    ctx.fill();
  });
}

function drawMaze() {
  ctx.fillStyle = "blue";
  for (let y = 0; y < maze.length; y++) {
    for (let x = 0; x < maze[y].length; x++) {
      if (maze[y][x] === 1) {
        ctx.fillRect(x * gridSize, y * gridSize, gridSize, gridSize);
      }
    }
  }
}

function update() {
  if (gameOver) return;

  let nextX = pacman.x + pacman.dx;
  let nextY = pacman.y + pacman.dy;

  if (maze[nextY] && maze[nextY][nextX] === 0) {
    pacman.x = nextX;
    pacman.y = nextY;
  }

  dots = dots.filter(dot => {
    if (dot.x === pacman.x && dot.y === pacman.y) {
      score += 10;
      return false;
    }
    return true;
  });

  // level complete
  if (dots.length === 0) {
    level++;
    initLevel();
  }

  // simple ending condition
  if (level > 5) {
    gameOver = true;
  }

  ui.textContent = `Score: ${score} | Level: ${level}`;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawMaze();
  drawDots();
  drawPacman();

  if (gameOver) {
    ctx.fillStyle = "white";
    ctx.font = "40px Arial";
    ctx.fillText("YOU WIN!", canvas.width / 2 - 100, canvas.height / 2);
  }
}

function gameLoop() {
  update();
  draw();
}

setInterval(gameLoop, 120);

document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp") {
    pacman.dx = 0; pacman.dy = -1;
  } else if (e.key === "ArrowDown") {
    pacman.dx = 0; pacman.dy = 1;
  } else if (e.key === "ArrowLeft") {
    pacman.dx = -1; pacman.dy = 0;
  } else if (e.key === "ArrowRight") {
    pacman.dx = 1; pacman.dy = 0;
  }
});

initLevel();
</script>
</body>
</html>
