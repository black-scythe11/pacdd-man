<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pac-Man Progressive</title>
  <style>
    body {
      background: black;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      flex-direction: column;
    }

    canvas {
      background: black;
      border: 3px solid yellow;
      display: none;
    }

    #ui {
      margin-bottom: 10px;
      font-size: 18px;
      display: none;
    }

    .screen {
      position: absolute;
      text-align: center;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      margin-top: 10px;
    }

    #homeScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #gameOverScreen {
      display: none;
      flex-direction: column;
      align-items: center;
    }
  </style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="homeScreen" class="screen">
  <h1>Pac-Man Progressive</h1>
  <button onclick="startGame()">Start Game</button>
</div>

<!-- UI -->
<div id="ui">Score: 0 | Level: 1</div>

<canvas id="gameCanvas"></canvas>

<!-- GAME OVER SCREEN -->
<div id="gameOverScreen" class="screen">
  <h1 id="gameOverText">Game Over</h1>
  <button onclick="restartGame()">Restart</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");

const homeScreen = document.getElementById("homeScreen");
const gameOverScreen = document.getElementById("gameOverScreen");
const gameOverText = document.getElementById("gameOverText");

let gridSize = 25;
let level = 1;
let score = 0;
let gameState = "home";

let pacman;
let maze;
let dots;
let enemies = [];
let exitPoint;

function resizeCanvas(size) {
  canvas.width = size;
  canvas.height = size;
}

// simple maze with guaranteed open space (kept safe + playable)
function generateMaze(size, density) {
  let maze = Array(size).fill(0).map(() => Array(size).fill(0));

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      if (y === 0 || x === 0 || y === size - 1 || x === size - 1) {
        maze[y][x] = 1;
      } else if (Math.random() < density) {
        maze[y][x] = 1;
      }
    }
  }

  // ensure start + exit are open
  maze[1][1] = 0;
  maze[size - 2][size - 2] = 0;

  return maze;
}

function randomEmptyCell() {
  let x, y;
  do {
    x = Math.floor(Math.random() * maze.length);
    y = Math.floor(Math.random() * maze.length);
  } while (maze[y][x] === 1);
  return { x, y };
}

function initLevel() {
  let size = 10 + level * 4;
  resizeCanvas(size * gridSize);

  maze = generateMaze(size, 0.25 + level * 0.05);

  pacman = { x: 1, y: 1, dx: 1, dy: 0 };

  exitPoint = { x: size - 2, y: size - 2 };

  dots = [];
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      if (maze[y][x] === 0) dots.push({ x, y });
    }
  }

  // ENEMIES SCALE HARDER NOW
  enemies = [];
  let enemyCount = Math.min(2 + level * 2, 15);
  for (let i = 0; i < enemyCount; i++) {
    let pos = randomEmptyCell();
    enemies.push({ x: pos.x, y: pos.y });
  }
}

function startGame() {
  gameState = "playing";
  homeScreen.style.display = "none";
  gameOverScreen.style.display = "none";
  canvas.style.display = "block";
  ui.style.display = "block";

  level = 1;
  score = 0;
  initLevel();
}

function restartGame() {
  startGame();
}

function gameOver() {
  gameState = "gameover";
  canvas.style.display = "none";
  ui.style.display = "none";
  gameOverScreen.style.display = "flex";
}

function drawPacman() {
  ctx.beginPath();
  ctx.arc(
    pacman.x * gridSize + gridSize / 2,
    pacman.y * gridSize + gridSize / 2,
    gridSize / 2,
    0.25 * Math.PI,
    1.75 * Math.PI
  );
  ctx.lineTo(
    pacman.x * gridSize + gridSize / 2,
    pacman.y * gridSize + gridSize / 2
  );
  ctx.fillStyle = "yellow";
  ctx.fill();
}

function drawMaze() {
  ctx.fillStyle = "blue";
  for (let y = 0; y < maze.length; y++) {
    for (let x = 0; x < maze[y].length; x++) {
      if (maze[y][x] === 1) {
        ctx.fillRect(x * gridSize, y * gridSize, gridSize, gridSize);
      }
    }
  }
}

function drawDots() {
  ctx.fillStyle = "white";
  dots.forEach(d => {
    ctx.beginPath();
    ctx.arc(d.x * gridSize + gridSize / 2, d.y * gridSize + gridSize / 2, 3, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawExit() {
  ctx.fillStyle = "lime";
  ctx.fillRect(exitPoint.x * gridSize, exitPoint.y * gridSize, gridSize, gridSize);
}

function drawEnemies() {
  ctx.fillStyle = "red";
  enemies.forEach(e => {
    ctx.beginPath();
    ctx.arc(
      e.x * gridSize + gridSize / 2,
      e.y * gridSize + gridSize / 2,
      gridSize / 2,
      0,
      Math.PI * 2
    );
    ctx.fill();
  });
}

function moveEnemies() {
  enemies.forEach(e => {
    let dirs = [
      { dx: 1, dy: 0 },
      { dx: -1, dy: 0 },
      { dx: 0, dy: 1 },
      { dx: 0, dy: -1 }
    ];

    let move = dirs[Math.floor(Math.random() * dirs.length)];
    let nx = e.x + move.dx;
    let ny = e.y + move.dy;

    if (maze[ny] && maze[ny][nx] === 0) {
      e.x = nx;
      e.y = ny;
    }
  });
}

function update() {
  if (gameState !== "playing") return;

  let nextX = pacman.x + pacman.dx;
  let nextY = pacman.y + pacman.dy;

  if (maze[nextY] && maze[nextY][nextX] === 0) {
    pacman.x = nextX;
    pacman.y = nextY;
  }

  dots = dots.filter(d => {
    if (d.x === pacman.x && d.y === pacman.y) {
      score += 10;
      return false;
    }
    return true;
  });

  // ENEMY COLLISION → GAME OVER
  enemies.forEach(e => {
    if (e.x === pacman.x && e.y === pacman.y) {
      gameOver();
    }
  });

  // NEXT LEVEL
  if (pacman.x === exitPoint.x && pacman.y === exitPoint.y) {
    level++;
    initLevel();
  }

  if (level > 5) {
    gameOverText.innerText = "YOU WIN!";
    gameOver();
  }

  moveEnemies();
  ui.textContent = `Score: ${score} | Level: ${level}`;
}

function draw() {
  if (gameState !== "playing") return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawMaze();
  drawExit();
  drawDots();
  drawEnemies();
  drawPacman();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

document.addEventListener("keydown", e => {
  if (gameState !== "playing") return;

  if (e.key === "ArrowUp") { pacman.dx = 0; pacman.dy = -1; }
  else if (e.key === "ArrowDown") { pacman.dx = 0; pacman.dy = 1; }
  else if (e.key === "ArrowLeft") { pacman.dx = -1; pacman.dy = 0; }
  else if (e.key === "ArrowRight") { pacman.dx = 1; pacman.dy = 0; }
});

loop();
</script>

</body>
</html>
