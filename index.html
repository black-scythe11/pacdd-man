<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pac-Man Mobile</title>

<style>
body {
  background: black;
  margin: 0;
  font-family: Arial;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* UI */
#ui {
  margin: 10px;
  font-size: 16px;
  display: none;
}

/* Canvas */
canvas {
  background: black;
  border: 3px solid yellow;
  display: none;
  max-width: 95vw;
  max-height: 70vh;
}

/* Screens */
.screen {
  position: absolute;
  text-align: center;
}

button {
  padding: 15px 30px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

/* MOBILE CONTROLS */
#controls {
  display: none;
  margin-top: 10px;
}

.control-btn {
  width: 70px;
  height: 70px;
  font-size: 24px;
  margin: 5px;
}

.controls-row {
  display: flex;
  justify-content: center;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="homeScreen" class="screen">
  <h1>Pac-Man</h1>
  <button onclick="startGame()">Start</button>
</div>

<div id="ui">Score: 0 | Level: 1</div>
<canvas id="gameCanvas"></canvas>

<!-- GAME OVER -->
<div id="gameOverScreen" class="screen" style="display:none;">
  <h1 id="gameOverText">Game Over</h1>
  <button onclick="restartGame()">Restart</button>
</div>

<!-- TOUCH CONTROLS -->
<div id="controls">
  <div class="controls-row">
    <button class="control-btn" onclick="setDir(0,-1)">↑</button>
  </div>
  <div class="controls-row">
    <button class="control-btn" onclick="setDir(-1,0)">←</button>
    <button class="control-btn" onclick="setDir(1,0)">→</button>
  </div>
  <div class="controls-row">
    <button class="control-btn" onclick="setDir(0,1)">↓</button>
  </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const ui = document.getElementById("ui");
const homeScreen = document.getElementById("homeScreen");
const gameOverScreen = document.getElementById("gameOverScreen");
const gameOverText = document.getElementById("gameOverText");
const controls = document.getElementById("controls");

let gridSize = 20;
let level = 1;
let score = 0;
let gameState = "home";

let pacman, maze, dots, enemies, exitPoint;

/* RESPONSIVE CANVAS */
function resizeCanvas(size) {
  let maxSize = Math.min(window.innerWidth * 0.95, window.innerHeight * 0.65);
  canvas.width = maxSize;
  canvas.height = maxSize;
  gridSize = canvas.width / size;
}

/* SIMPLE MAZE */
function generateMaze(size, density) {
  let maze = Array(size).fill(0).map(() => Array(size).fill(0));

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      if (y === 0 || x === 0 || y === size - 1 || x === size - 1) {
        maze[y][x] = 1;
      } else if (Math.random() < density) {
        maze[y][x] = 1;
      }
    }
  }

  maze[1][1] = 0;
  maze[size - 2][size - 2] = 0;

  return maze;
}

function randomEmptyCell() {
  let x, y;
  do {
    x = Math.floor(Math.random() * maze.length);
    y = Math.floor(Math.random() * maze.length);
  } while (maze[y][x] === 1);
  return { x, y };
}

function initLevel() {
  let size = 10 + level * 3;
  resizeCanvas(size);

  maze = generateMaze(size, 0.25);

  pacman = { x: 1, y: 1, dx: 1, dy: 0 };
  exitPoint = { x: size - 2, y: size - 2 };

  dots = [];
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      if (maze[y][x] === 0) dots.push({ x, y });
    }
  }

  enemies = [];
  let count = Math.min(2 + level * 2, 12);
  for (let i = 0; i < count; i++) {
    let pos = randomEmptyCell();
    enemies.push({ x: pos.x, y: pos.y });
  }
}

/* GAME STATES */
function startGame() {
  gameState = "playing";
  homeScreen.style.display = "none";
  gameOverScreen.style.display = "none";
  canvas.style.display = "block";
  ui.style.display = "block";
  controls.style.display = "block";

  level = 1;
  score = 0;

  initLevel();
}

function restartGame() {
  startGame();
}

function gameOver() {
  gameState = "gameover";
  canvas.style.display = "none";
  controls.style.display = "none";
  ui.style.display = "none";
  gameOverScreen.style.display = "block";
}

/* CONTROLS */
function setDir(dx, dy) {
  if (gameState !== "playing") return;
  pacman.dx = dx;
  pacman.dy = dy;
}

/* KEYBOARD SUPPORT */
document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp") setDir(0,-1);
  if (e.key === "ArrowDown") setDir(0,1);
  if (e.key === "ArrowLeft") setDir(-1,0);
  if (e.key === "ArrowRight") setDir(1,0);
});

/* DRAW */
function drawMaze() {
  ctx.fillStyle = "blue";
  maze.forEach((row,y)=>{
    row.forEach((cell,x)=>{
      if (cell===1) ctx.fillRect(x*gridSize,y*gridSize,gridSize,gridSize);
    });
  });
}

function drawPacman() {
  ctx.beginPath();
  ctx.arc(
    pacman.x*gridSize+gridSize/2,
    pacman.y*gridSize+gridSize/2,
    gridSize/2,
    0.25*Math.PI,
    1.75*Math.PI
  );
  ctx.fillStyle="yellow";
  ctx.fill();
}

function drawEnemies() {
  ctx.fillStyle="red";
  enemies.forEach(e=>{
    ctx.beginPath();
    ctx.arc(
      e.x*gridSize+gridSize/2,
      e.y*gridSize+gridSize/2,
      gridSize/2,
      0,Math.PI*2
    );
    ctx.fill();
  });
}

function drawDots() {
  ctx.fillStyle="white";
  dots.forEach(d=>{
    ctx.beginPath();
    ctx.arc(d.x*gridSize+gridSize/2,d.y*gridSize+gridSize/2,3,0,Math.PI*2);
    ctx.fill();
  });
}

function drawExit() {
  ctx.fillStyle="lime";
  ctx.fillRect(exitPoint.x*gridSize,exitPoint.y*gridSize,gridSize,gridSize);
}

/* UPDATE */
function moveEnemies() {
  enemies.forEach(e=>{
    let dirs=[
      {dx:1,dy:0},{dx:-1,dy:0},
      {dx:0,dy:1},{dx:0,dy:-1}
    ];
    let m=dirs[Math.floor(Math.random()*4)];
    let nx=e.x+m.dx, ny=e.y+m.dy;
    if (maze[ny] && maze[ny][nx]===0){
      e.x=nx; e.y=ny;
    }
  });
}

function update() {
  if (gameState!=="playing") return;

  let nx=pacman.x+pacman.dx;
  let ny=pacman.y+pacman.dy;

  if (maze[ny] && maze[ny][nx]===0){
    pacman.x=nx; pacman.y=ny;
  }

  dots=dots.filter(d=>{
    if (d.x===pacman.x && d.y===pacman.y){
      score+=10;
      return false;
    }
    return true;
  });

  enemies.forEach(e=>{
    if (e.x===pacman.x && e.y===pacman.y){
      gameOver();
    }
  });

  if (pacman.x===exitPoint.x && pacman.y===exitPoint.y){
    level++;
    initLevel();
  }

  moveEnemies();
  ui.textContent=`Score: ${score} | Level: ${level}`;
}

/* LOOP */
function loop(){
  update();
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (gameState==="playing"){
    drawMaze();
    drawExit();
    drawDots();
    drawEnemies();
    drawPacman();
  }

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
