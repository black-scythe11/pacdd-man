<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pac-Man Simple</title>
  <style>
    body {
      background: black;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas {
      background: #000;
    }
  </style>
</head>
<body>
<canvas id="gameCanvas" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const gridSize = 20;
const rows = canvas.height / gridSize;
const cols = canvas.width / gridSize;

let pacman = {
  x: 1,
  y: 1,
  dx: 1,
  dy: 0
};

let dots = [];
for (let y = 0; y < rows; y++) {
  for (let x = 0; x < cols; x++) {
    dots.push({ x, y });
  }
}

function drawPacman() {
  ctx.beginPath();
  ctx.arc(
    pacman.x * gridSize + gridSize / 2,
    pacman.y * gridSize + gridSize / 2,
    gridSize / 2,
    0.25 * Math.PI,
    1.75 * Math.PI
  );
  ctx.lineTo(pacman.x * gridSize + gridSize / 2, pacman.y * gridSize + gridSize / 2);
  ctx.fillStyle = "yellow";
  ctx.fill();
}

function drawDots() {
  ctx.fillStyle = "white";
  dots.forEach(dot => {
    ctx.beginPath();
    ctx.arc(
      dot.x * gridSize + gridSize / 2,
      dot.y * gridSize + gridSize / 2,
      3,
      0,
      Math.PI * 2
    );
    ctx.fill();
  });
}

function update() {
  pacman.x += pacman.dx;
  pacman.y += pacman.dy;

  // wrap around
  if (pacman.x < 0) pacman.x = cols - 1;
  if (pacman.x >= cols) pacman.x = 0;
  if (pacman.y < 0) pacman.y = rows - 1;
  if (pacman.y >= rows) pacman.y = 0;

  // eat dots
  dots = dots.filter(dot => !(dot.x === pacman.x && dot.y === pacman.y));
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawDots();
  drawPacman();
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp") {
    pacman.dx = 0;
    pacman.dy = -1;
  } else if (e.key === "ArrowDown") {
    pacman.dx = 0;
    pacman.dy = 1;
  } else if (e.key === "ArrowLeft") {
    pacman.dx = -1;
    pacman.dy = 0;
  } else if (e.key === "ArrowRight") {
    pacman.dx = 1;
    pacman.dy = 0;
  }
});

gameLoop();
</script>
</body>
</html>
